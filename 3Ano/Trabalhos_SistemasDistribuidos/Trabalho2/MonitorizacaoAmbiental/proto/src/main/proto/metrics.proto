syntax = "proto3";

//Definições para o Java saber onde gerar o código
package pt.uevora.sd.grpc;
option java_multiple_files = true;
option java_package = "pt.uevora.sd.grpc";
option java_outer_classname = "MetricsProto";

//O Serviço (As funções que o Servidor oferece)
service MetricsService {
  //Recebe um pedido, devolve uma resposta.
  rpc SubmitMetric (MetricRequest) returns (MetricResponse);
}

//A Mensagem de Pedido (O que o Sensor envia)
message MetricRequest {
  string deviceId = 1;     // ID do sensor
  double temperature = 2;  // Valor da temperatura
  double humidity = 3;     // Valor da humidade
  string timestamp = 4;    // Data e hora
}

//A Mensagem de Resposta (O que o Servidor responde)
message MetricResponse {
  string message = 1;      // Mensagem de resposta
}